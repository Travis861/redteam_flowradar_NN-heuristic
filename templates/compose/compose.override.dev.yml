services:
  challenge-api:
    image: redteamsubnet61/flowradar-challenge:latest
    volumes:
      - "./src/flr_challenge/challenge/scripts/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh"
      - "./src/flr_challenge/challenge/api:/app/flowradar-challenge/api"
      - "./volumes/.vscode-server:/home/flr-user/.vscode-server"
