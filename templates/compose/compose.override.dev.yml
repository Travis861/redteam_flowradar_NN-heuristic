    # ports: !override
    #   - "10001-10003:${FLR_API_PORT:-10001}"
    # command: ["/bin/bash"]
    # command: ["-b", "uvicorn api.main:app --host=0.0.0.0 --port=${FLR_API_PORT:-10001} --no-access-log --no-server-header --proxy-headers --forwarded-allow-ips='*' --reload"]
